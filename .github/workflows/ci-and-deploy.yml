name: CI and GitHub Container Registry deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  backend-ci:
    name: Backend CI and smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci
      - name: Start backend and verify health
        run: |
          cd backend
          node src/server.js &
          pid=$!
          n=0
          until curl --silent --fail http://127.0.0.1:5000/api/health; do
            n=$((n+1))
            if [ $n -ge 12 ]; then
              echo "Backend did not start in time"
              kill "$pid" || true
              exit 1
            fi
            sleep 2
          done
          kill "$pid"

  ml-service-ci:
    name: ML service CI and smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install ML service dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ml-service/requirements.txt
      - name: Run ML service tests
        run: |
          cd ml-service
          pytest tests/test_engines.py
      - name: Start ML service and verify health
        run: |
          cd ml-service
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          pid=$!
          n=0
          until curl --silent --fail http://127.0.0.1:8000/health; do
            n=$((n+1))
            if [ $n -ge 12 ]; then
              echo "ML service did not start in time"
              kill "$pid" || true
              exit 1
            fi
            sleep 2
          done
          kill "$pid"

  publish-backend-image:
    name: Publish backend Docker image to GHCR
    needs: backend-ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/loan-backend:latest
            ghcr.io/${{ github.repository_owner }}/loan-backend:${{ github.sha }}

  publish-ml-service-image:
    name: Publish ML service Docker image to GHCR
    needs: ml-service-ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ML service Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          file: ./ml-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/loan-ml-service:latest
            ghcr.io/${{ github.repository_owner }}/loan-ml-service:${{ github.sha }}

  deploy-ml-service-fly:
    name: Deploy ML service to Fly.io
    needs: ml-service-ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Flyctl
        uses: superfly/flyctl-actions@v2
        with:
          version: latest
      - name: Deploy ML service to Fly
        run: flyctl deploy --remote-only --config ml-service/fly.toml --app "${{ secrets.FLY_ML_APP }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-backend-fly:
    name: Deploy backend to Fly.io
    needs: [backend-ci, deploy-ml-service-fly]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Flyctl
        uses: superfly/flyctl-actions@v2
        with:
          version: latest
      - name: Deploy backend to Fly
        run: flyctl deploy --remote-only --config backend/fly.toml --app "${{ secrets.FLY_BACKEND_APP }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Configure backend ML service URL
        run: |
          flyctl secrets set ML_SERVICE_URL=https://${{ secrets.FLY_ML_APP }}.fly.dev --app "${{ secrets.FLY_BACKEND_APP }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
